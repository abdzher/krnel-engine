---
# =============================================================================
# KRNEL — playbooks/05-jupyterhub.yml
# Tarea 8: Despliegue de JupyterHub sobre k3s.
#
# PRE-REQUISITOS antes de ejecutar:
#   1. proxy_token y jupyterhub_admin_pass deben estar cifrados en Ansible Vault.
#      ansible-vault encrypt_string "$(openssl rand -hex 32)" --name proxy_token
#      ansible-vault encrypt_string "dicifo2026" --name jupyterhub_admin_pass
#   2. Copiar files/allowlist.txt.example a files/allowlist.txt y agregar
#      los correos electrónicos autorizados (uno por línea).
#
# Para ACTUALIZAR JupyterHub (dry-run + despliegue):
#   ansible-playbook playbooks/05-jupyterhub.yml --tags update_dry
#   ansible-playbook playbooks/05-jupyterhub.yml --tags update
# =============================================================================

- name: "TAREA 8 | Desplegar JupyterHub"
  hosts: master
  become: false
  tasks:
    # -------------------------------------------------------------------------
    # Archivos Temporales Seguros
    # -------------------------------------------------------------------------
    - name: Crear archivo temporal para hub-values
      ansible.builtin.tempfile:
        state: file
        suffix: -hub.yaml
      register: tmp_hub_values

    - name: Crear archivo temporal para spark-rbac
      ansible.builtin.tempfile:
        state: file
        suffix: -rbac.yaml
      register: tmp_spark_rbac

    # -------------------------------------------------------------------------
    # Pre-validaciones
    # -------------------------------------------------------------------------
    - name: Verificar que el archivo allowlist.txt existe en files/
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../files/allowlist.txt"
      register: allowlist_stat
      delegate_to: localhost

    - name: Fallar si allowlist.txt no existe
      ansible.builtin.fail:
        msg: >
          No se encontró 'files/allowlist.txt'.
          Copia 'files/allowlist.txt.example' a 'files/allowlist.txt' y
          agrega los correos autorizados (uno por línea).
      when: not allowlist_stat.stat.exists

    - name: Verificar que proxy_token no es el valor de ejemplo
      ansible.builtin.fail:
        msg: >
          'proxy_token' contiene el valor de ejemplo. Genera y cifra el token real:
          ansible-vault encrypt_string "$(openssl rand -hex 32)" --name proxy_token
      when: proxy_token == "REEMPLAZAR_CON_ANSIBLE_VAULT"

    # -------------------------------------------------------------------------
    # ResourceQuota y LimitRange — aplicar ANTES de desplegar JupyterHub
    # Garantiza que los limits existen desde el primer pod que se cree.
    # -------------------------------------------------------------------------
    - name: Crear namespace {{ jupyterhub_namespace }} si no existe
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: v1
        kind: Namespace
        name: "{{ jupyterhub_namespace }}"
        state: present

    - name: Renderizar spark-quota.yaml desde plantilla
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/spark-quota.yaml.j2"
        dest: "/tmp/spark-quota-{{ ansible_date_time.epoch }}.yaml"
        mode: "0644"
      register: quota_tmp

    - name: Aplicar ResourceQuota y LimitRange al namespace jupyter
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        src: "{{ quota_tmp.dest }}"

    - name: Limpiar spark-quota.yaml temporal
      ansible.builtin.file:
        path: "{{ quota_tmp.dest }}"
        state: absent

    # -------------------------------------------------------------------------
    # Repositorio Helm de JupyterHub
    # -------------------------------------------------------------------------
    - name: Agregar repositorio Helm de JupyterHub
      kubernetes.core.helm_repository:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: jupyterhub
        repo_url: "https://hub.jupyter.org/helm-chart/"
        state: present

    # -------------------------------------------------------------------------
    # RBAC de Spark
    # -------------------------------------------------------------------------
    - name: Renderizar spark-rbac.yaml desde plantilla
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/spark-rbac.yaml.j2"
        dest: "{{ tmp_spark_rbac.path }}"
        mode: "0644"

    - name: Aplicar políticas RBAC de Spark al clúster
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        src: "{{ tmp_spark_rbac.path }}"

    - name: Limpiar spark-rbac.yaml temporal
      ansible.builtin.file:
        path: "{{ tmp_spark_rbac.path }}"
        state: absent

    # -------------------------------------------------------------------------
    # Despliegue de JupyterHub
    # El allowlist se incrusta en el template hub-values.yaml.j2 directamente,
    # eliminando la necesidad de --set-file (no compatible con kubernetes.core.helm).
    # -------------------------------------------------------------------------
    - name: Renderizar hub-values.yaml desde plantilla Jinja2 (con allowlist embebido)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/hub-values.yaml.j2"
        dest: "{{ tmp_hub_values.path }}"
        mode: "0600"   # Permisos restrictivos: contiene credenciales

    - name: Instalar/Actualizar JupyterHub (upgrade --install)
      kubernetes.core.helm:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: "{{ jupyterhub_release }}"
        chart_ref: jupyterhub/jupyterhub
        release_namespace: "{{ jupyterhub_namespace }}"
        create_namespace: true
        chart_version: "{{ jupyterhub_version }}"
        values_files:
          - "{{ tmp_hub_values.path }}"
        update_repo_cache: true
        state: present
      tags: [update]

    - name: Dry-run de actualización de JupyterHub (validar antes de aplicar)
      kubernetes.core.helm:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: "{{ jupyterhub_release }}"
        chart_ref: jupyterhub/jupyterhub
        release_namespace: "{{ jupyterhub_namespace }}"
        chart_version: "{{ jupyterhub_version }}"
        values_files:
          - "{{ tmp_hub_values.path }}"
        update_repo_cache: false
        state: present
      check_mode: true   # Equivalente a --dry-run
      tags: [update_dry, never]

    - name: Limpiar hub-values.yaml temporal (contiene credenciales)
      ansible.builtin.file:
        path: "{{ tmp_hub_values.path }}"
        state: absent

    # -------------------------------------------------------------------------
    # Verificación
    # -------------------------------------------------------------------------
    - name: Esperar a que el Hub esté disponible
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        kind: Deployment
        namespace: "{{ jupyterhub_namespace }}"
        name: hub
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300
      register: hub_status
      ignore_errors: true

    - name: Confirmar despliegue de JupyterHub
      ansible.builtin.debug:
        msg: >
          JupyterHub '{{ jupyterhub_release }}' v{{ jupyterhub_version }} desplegado en
          namespace '{{ jupyterhub_namespace }}'. Accesible en NodePort {{ jupyterhub_port }}
          y dominio https://{{ jupyterhub_domain }}.
