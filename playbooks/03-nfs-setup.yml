---
# =============================================================================
# KRNEL — playbooks/03-nfs-setup.yml
# Tarea 5: Instalación y configuración del servidor NFS en nd-1 y
#          del cliente NFS en los workers.
# Tarea 6: Instalación del NFS Subdir External Provisioner (StorageClass dinámica).
# =============================================================================

# -----------------------------------------------------------------------------
# TAREA 5 — Servidor NFS en nd-1
# -----------------------------------------------------------------------------
- name: "TAREA 5 | Configurar servidor NFS en nd-1"
  hosts: master
  become: true
  handlers:
    - name: Reexportar shares NFS
      ansible.builtin.command: exportfs -ra
      changed_when: true

    - name: Reiniciar nfs-kernel-server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: restarted
        enabled: true

  tasks:
    - name: Instalar paquete nfs-kernel-server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: true

    - name: Crear directorios de shares NFS con permisos correctos
      ansible.builtin.file:
        path: "{{ nfs_base_path }}/{{ item }}"
        state: directory
        owner: nobody
        group: nogroup
        mode: "0777"
      loop: "{{ nfs_shares }}"

    - name: Configurar /etc/exports (idempotente via blockinfile)
      ansible.builtin.blockinfile:
        path: /etc/exports
        marker: "# {mark} KRNEL MRKOV NFS EXPORTS"
        create: true
        block: |
          {% for share in nfs_shares %}
          {{ nfs_base_path }}/{{ share }} {{ network_segment }}(rw,sync,no_subtree_check,no_root_squash)
          {% endfor %}
      notify:
        - Reexportar shares NFS
        - Reiniciar nfs-kernel-server

    - name: Asegurar que nfs-kernel-server está habilitado y activo
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: started
        enabled: true

# -----------------------------------------------------------------------------
# TAREA 5 — Cliente NFS en workers
# -----------------------------------------------------------------------------
- name: "TAREA 5 | Instalar cliente NFS en los workers"
  hosts: workers
  become: true
  tasks:
    - name: Instalar paquete nfs-common
      ansible.builtin.apt:
        name: nfs-common
        state: present
        update_cache: true

# -----------------------------------------------------------------------------
# TAREA 6 — CSI Driver NFS
# Instala el driver oficial CSI y crea la StorageClass 'nfs-master'
# para los PVCs de JupyterHub.
# -----------------------------------------------------------------------------
- name: "TAREA 6 | Instalar CSI Driver NFS"
  hosts: master
  become: false
  tasks:
    - name: Agregar repositorio Helm del CSI Driver NFS
      kubernetes.core.helm_repository:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: csi-driver-nfs
        repo_url: "https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts"
        state: present

    - name: Instalar/Actualizar CSI Driver NFS
      kubernetes.core.helm:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: csi-driver-nfs
        chart_ref: csi-driver-nfs/csi-driver-nfs
        chart_version: "4.13.2"
        release_namespace: kube-system
        update_repo_cache: true
        values:
          storageClass:
            create: true
            name: "{{ storage_class_name }}"
            defaultClass: false
            parameters:
              server: "{{ nd1_ip }}"
              share: "{{ nfs_base_path }}/jupyter-data"
            reclaimPolicy: Delete
            volumeBindingMode: Immediate
            mountOptions:
              - nfsvers=4.1
        state: present

    - name: Verificar que la StorageClass fue creada
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        kind: StorageClass
        name: "{{ storage_class_name }}"
      register: sc_info
      retries: 6
      delay: 10
      until: sc_info.resources | length > 0

    - name: Confirmar StorageClass disponible
      ansible.builtin.debug:
        msg: "StorageClass '{{ storage_class_name }}' creada y disponible."
