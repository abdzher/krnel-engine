---
# =============================================================================
# KRNEL — playbooks/03-longhorn.yml
# Tarea 3: Instalación de Longhorn como proveedor de almacenamiento por
# defecto para PVCs dinámicos del clúster MRKOV.
#
# NOTA: /var/lib/longhorn ya debe existir y estar montado en todos los nodos.
#       Este playbook no particiona, no formatea y no monta discos.
# =============================================================================

- name: "TAREA 5 y 6 | Instalar Longhorn"
  hosts: master
  become: false
  tasks:
    - name: Agregar repositorio Helm de Longhorn
      kubernetes.core.helm_repository:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: longhorn
        repo_url: "https://charts.longhorn.io"
        state: present

    - name: Instalar/Actualizar Longhorn (StorageClass por defecto)
      kubernetes.core.helm:
        kubeconfig: "{{ k8s_kubeconfig }}"
        name: "{{ longhorn_release }}"
        chart_ref: longhorn/longhorn
        chart_version: "{{ longhorn_version }}"
        release_namespace: "{{ longhorn_namespace }}"
        create_namespace: true
        update_repo_cache: true
        values:
          persistence:
            defaultClass: true
            defaultClassReplicaCount: "{{ longhorn_default_replica_count | string }}"
          defaultSettings:
            defaultDataPath: "{{ longhorn_data_path }}"
            defaultReplicaCount: "{{ longhorn_default_replica_count | string }}"
        state: present

    - name: Esperar a que el Deployment longhorn-driver-deployer esté disponible
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        kind: Deployment
        namespace: "{{ longhorn_namespace }}"
        name: longhorn-driver-deployer
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300

    - name: Esperar a que la StorageClass longhorn exista
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "{{ storage_class_name }}"
      register: longhorn_sc
      retries: 12
      delay: 10
      until: longhorn_sc.resources | length > 0

    - name: Obtener StorageClasses existentes
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: storage.k8s.io/v1
        kind: StorageClass
      register: storage_classes

    - name: Quitar anotación default de otras StorageClasses
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "{{ item.metadata.name }}"
        state: present
        definition:
          metadata:
            annotations:
              storageclass.kubernetes.io/is-default-class: "false"
      loop: "{{ storage_classes.resources }}"
      when:
        - item.metadata.name != storage_class_name
        - item.metadata.annotations is defined
        - item.metadata.annotations['storageclass.kubernetes.io/is-default-class'] | default('false') | bool

    - name: Asegurar que Longhorn queda como StorageClass por defecto
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "{{ storage_class_name }}"
        state: present
        definition:
          metadata:
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"

    - name: Renderizar Service NodePort de Longhorn
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/longhorn-nodeport-service.yaml.j2"
        dest: "/tmp/longhorn-nodeport-{{ ansible_facts['date_time']['epoch'] }}.yaml"
        mode: "0644"
      register: longhorn_nodeport_tmp
      when: longhorn_nodeport_enabled | default(false) | bool

    - name: Aplicar Service NodePort de Longhorn
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        src: "{{ longhorn_nodeport_tmp.dest }}"
      when: longhorn_nodeport_enabled | default(false) | bool

    - name: Limpiar manifest temporal de NodePort de Longhorn
      ansible.builtin.file:
        path: "{{ longhorn_nodeport_tmp.dest }}"
        state: absent
      when: longhorn_nodeport_enabled | default(false) | bool

    - name: Eliminar NodePort de Longhorn si está deshabilitado
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: v1
        kind: Service
        name: longhorn-frontend-nodeport
        namespace: "{{ longhorn_namespace }}"
        state: absent
      when: not (longhorn_nodeport_enabled | default(false) | bool)

    - name: Renderizar Ingress de Longhorn
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/longhorn-ingress.yaml.j2"
        dest: "/tmp/longhorn-ingress-{{ ansible_facts['date_time']['epoch'] }}.yaml"
        mode: "0644"
      register: longhorn_ingress_tmp
      when: longhorn_ingress_enabled | bool

    - name: Aplicar Ingress de Longhorn para Traefik
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        src: "{{ longhorn_ingress_tmp.dest }}"
      when: longhorn_ingress_enabled | bool

    - name: Limpiar manifest temporal de Ingress de Longhorn
      ansible.builtin.file:
        path: "{{ longhorn_ingress_tmp.dest }}"
        state: absent
      when: longhorn_ingress_enabled | bool

    - name: Eliminar Ingress de Longhorn si está deshabilitado
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: networking.k8s.io/v1
        kind: Ingress
        name: longhorn-ui
        namespace: "{{ longhorn_namespace }}"
        state: absent
      when: not (longhorn_ingress_enabled | bool)

    - name: Eliminar Middleware de Longhorn si el Ingress está deshabilitado
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: traefik.io/v1alpha1
        kind: Middleware
        name: longhorn-ui-ipallowlist
        namespace: "{{ longhorn_namespace }}"
        state: absent
      when: not (longhorn_ingress_enabled | bool)

    - name: Confirmar despliegue de Longhorn
      ansible.builtin.debug:
        msg: >
          Longhorn {{ longhorn_version }} instalado en '{{ longhorn_namespace }}'.
          StorageClass '{{ storage_class_name }}' configurada como default con
          {{ longhorn_default_replica_count }} réplicas y data path {{ longhorn_data_path }}.
